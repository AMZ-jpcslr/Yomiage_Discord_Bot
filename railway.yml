# Railway プロジェクト設定 - SVG地震マップ対応版
# このファイルをプロジェクトルートに配置

# ビルド設定 - 軽量Docker最適化
build:
  builder: DOCKERFILE
  dockerfilePath: Dockerfile.railway

# 環境変数 - SVG地震マップ対応の軽量設定
environment:
  NODE_ENV: production
  RAILWAY: true
  SKIP_MAP_GENERATION: false
  FORCE_MAP_GENERATION: true
  # SVG出力なのでメモリ制限を緩和
  NODE_OPTIONS: "--max-old-space-size=4096 --max-semi-space-size=64"
  # VoiceVox Web API設定
  # VOICEVOX_API_KEY: "your-api-key-here"  # デプロイ時に設定

# リソース設定 - SVG生成に最適化
resources:
  memory: 8192
  cpu: 2000

# ヘルスチェック
healthcheck:
  enabled: false
