# Railway プロジェクト設定
# このファイルをプロジェクトルートに配置

# ビルド設定 - 軽量Docker最適化
build:
  builder: DOCKERFILE
  dockerfilePath: Dockerfile.railway

# 環境変数 - SIGSEGV防止のための極限保守的メモリ設定
environment:
  NODE_ENV: production
  RAILWAY: true
  SKIP_MAP_GENERATION: false
  FORCE_MAP_GENERATION: true
  NODE_OPTIONS: "--max-old-space-size=2048 --max-semi-space-size=32"
  # VoiceVox Web API設定
  # VOICEVOX_API_KEY: "your-api-key-here"  # デプロイ時に設定

# リソース設定 - 最大メモリ活用
resources:
  memory: 8192
  cpu: 2000

# ヘルスチェック
healthcheck:
  enabled: false
