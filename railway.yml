# Railway プロジェクト設定
# このファイルをプロジェクトルートに配置

# ビルド設定 - Nixpacks優先、Dockerフォールバック
build:
  builder: nixpacks

# 環境変数 - 高メモリ環境用
environment:
  NODE_ENV: production
  RAILWAY: true
  SKIP_MAP_GENERATION: false
  FORCE_MAP_GENERATION: true
  NODE_OPTIONS: "--max-old-space-size=6144"
  # VoiceVox Web API設定
  # VOICEVOX_API_KEY: "your-api-key-here"  # デプロイ時に設定

# リソース設定 - 最大メモリ活用
resources:
  memory: 8192
  cpu: 2000

# ヘルスチェック
healthcheck:
  enabled: false
