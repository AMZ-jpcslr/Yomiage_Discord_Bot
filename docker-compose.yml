version: '3.8'

services:
  discord-bot:
    build: .
    container_name: earthquake-discord-bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - SKIP_MAP_GENERATION=false
    volumes:
      - ./generated_maps:/app/generated_maps
      - ./logs:/app/logs
    env_file:
      - .env
    # ヘルスチェック（オプション）
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # メモリ制限
    mem_limit: 512m
    # CPU制限
    cpus: '0.5'
