# Nixpacks configuration for Railway - High Memory Canvas Build
[phases.setup]
nixPkgs = [
  "nodejs_18", 
  "python3", 
  "pkg-config", 
  "cairo", 
  "pango", 
  "libpng", 
  "jpeg", 
  "giflib", 
  "librsvg", 
  "pixman", 
  "freetype",
  "vips",
  "ffmpeg", 
  "libopus", 
  "libsodium"
]

[variables]
NODE_ENV = "production"
RAILWAY = "true"
SKIP_MAP_GENERATION = "false"
FORCE_MAP_GENERATION = "true"
NODE_OPTIONS = "--max-old-space-size=6144"
