# Railway用設定 - Canvas対応の改善版
[providers]
node = "18"

[phases.setup]
nixPkgs = [
  "cairo",
  "pango",
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "pkg-config",
  "python3",
  "gcc",
  "make"
]

[phases.build]
cmds = [
  "npm ci --only=production --verbose",
  "npm rebuild canvas --build-from-source --verbose",
  "npm run compile"
]

[variables]
CANVAS_PREBUILT = "false"
NIXPACKS_NO_CACHE = "1"
NODE_ENV = "production"
