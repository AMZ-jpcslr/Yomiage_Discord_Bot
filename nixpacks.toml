# Nixpacks configuration for Railway
[phases.setup]
nixPkgs = ["nodejs_18", "python3", "pkg-config", "cairo", "pango", "libpng", "jpeg", "giflib", "librsvg", "pixman", "ffmpeg", "libopus", "libsodium"]

[phases.build]
cmd = "npm ci && npm run build"

[phases.start]
cmd = "npm run start:railway"

[variables]
NODE_ENV = "production"
RAILWAY = "true"
NODE_OPTIONS = "--max-old-space-size=1024"
