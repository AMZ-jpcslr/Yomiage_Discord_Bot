# Railway用設定 - Dockerを使用してCanvas対応
[phases.setup]
nixPkgs = [
  "cairo",
  "pango", 
  "libjpeg",
  "giflib",
  "librsvg",
  "pixman",
  "pkg-config"
]

[phases.build]
cmds = [
  "npm ci",
  "npm rebuild canvas --build-from-source",
  "npm run compile"
]

# Dockerを優先使用する設定
[variables]
NIXPACKS_NO_CACHE = "1"
